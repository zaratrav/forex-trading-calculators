<!DOCTYPE html>
<html>
<head>
<title>Leverage Calculator</title>
<meta name="google-site-verification" content="PkLa_ViOo6FAHpvh8SacceMb95o9tePRdrqLNBz9X1M" />
<link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>Leverage Calculator</h1>

<input id="a" placeholder="Value A">
<input id="b" placeholder="Value B">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let position=+a.value||0;let capital=+b.value||1;res.innerText=(position/capital).toFixed(2)+'x';}
</script>

</body>
</html>
