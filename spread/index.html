<!DOCTYPE html>
<html>
<head>
<title>Spread Calculator</title>
<meta name="google-site-verification" content="PkLa_ViOo6FAHpvh8SacceMb95o9tePRdrqLNBz9X1M" />
<link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>Spread Calculator</h1>

<input id="a" placeholder="Value A">
<input id="b" placeholder="Value B">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let bid=+a.value||0;let ask=+b.value||0;res.innerText=(ask-bid).toFixed(4);} 
</script>

</body>
</html>
