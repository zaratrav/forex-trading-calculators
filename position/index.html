<title>Position Size Calculator</title>

</head>
<body>

<h1>Position Size Calculator</h1>

<input id="a" placeholder="Value A">
<input id="b" placeholder="Value B">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let risk=+a.value||0;let stop=+b.value||1;res.innerText=(risk/stop).toFixed(2);} 
</script>

</body>
