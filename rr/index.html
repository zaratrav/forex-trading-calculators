<body>

<h1>Reward Risk Ratio Calculator</h1>

<input id="a" placeholder="Value A">
<input id="b" placeholder="Value B">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let reward=+a.value||0;let risk=+b.value||1;res.innerText=(reward/risk).toFixed(2);} 
</script>
