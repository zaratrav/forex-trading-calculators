<!DOCTYPE html>

<title>Rollover Fee Calculator</title>

<link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>Rollover Fee Calculator</h1>

<input id="a" placeholder="Value A">
<input id="b" placeholder="Value B">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let lot=+a.value||0;let fee=+b.value||0;res.innerText='$'+(lot*fee).toFixed(2);} 
</script>

</body>
