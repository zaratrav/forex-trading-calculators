<!DOCTYPE html>
<html>
<head>
<title>Margin Calculator</title>

<link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>Margin Calculator</h1>

<input id="a" placeholder="Value A">
<input id="b" placeholder="Value B">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let trade=+a.value||0;let lev=+b.value||1;res.innerText='$'+(trade/lev).toFixed(2);} 
</script>

</body>
